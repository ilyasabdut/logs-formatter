<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Prevent theme flash by setting initial theme before app loads -->
		<script>
			(function() {
				const isExtension = typeof chrome !== 'undefined' && chrome.storage;

				const applyTheme = (theme) => {
					if (theme === 'dark') {
						document.documentElement.classList.add('dark');
					} else {
						document.documentElement.classList.remove('dark');
					}
				};

				// Apply system preference IMMEDIATELY (synchronous)
				const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				applyTheme(prefersDark ? 'dark' : 'light');

				// Then try to get stored preference and update
				if (isExtension) {
					// Chrome extension: use chrome.storage.local (async)
					chrome.storage.local.get(['theme'], (result) => {
						const stored = result.theme;
						if (stored) {
							applyTheme(stored);
						}
					});
				} else {
					// Fallback to localStorage for non-extension builds
					try {
						const stored = localStorage.getItem('theme');
						if (stored) {
							applyTheme(stored);
						}
					} catch (e) {
						// System preference already applied above
					}
				}
			})();
		</script>

		<style>
			html, body {
				width: 100%;
				min-height: 100vh;
				margin: 0;
				padding: 0;
				overflow-x: hidden;
			}
		</style>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
